<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureChat — Server Setup</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="setup-page">
    <div class="setup-container">

      <div class="setup-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>

      <div class="setup-badge">SERVER NODE</div>
      <h1>Start Server</h1>
      <p class="setup-subtitle">Configure your listening endpoint. The client will connect to this address.</p>

      <form method="POST">
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 8 0v2"/></svg>
            Display Name
          </label>
          <input type="text" id="name" name="name" placeholder="e.g. Alice" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
            Local IP Address
          </label>
          <input type="text" id="ip" name="ip" value="127.0.0.1" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
            Port
          </label>
          <input type="number" id="port" name="port" value="8080" required>
        </div>
        <button type="submit">Start Listening</button>
      </form>

      <p class="setup-footer">END-TO-END ENCRYPTED &nbsp;·&nbsp; AES-256-GCM &nbsp;·&nbsp; DIFFIE-HELLMAN</p>
    </div>
  </div>
</body>
</html>
