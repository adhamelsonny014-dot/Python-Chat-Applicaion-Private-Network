<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureChat — Client Setup</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="setup-page">
    <div class="setup-container">

      <div class="setup-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>

      <div class="setup-badge">CLIENT NODE</div>
      <h1>Connect to Server</h1>
      <p class="setup-subtitle">Enter the server's address to establish an encrypted session.</p>

      <form method="POST">
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 8 0v2"/></svg>
            Display Name
          </label>
          <input type="text" id="name" name="name" placeholder="e.g. Bob" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Server IP Address
          </label>
          <input type="text" id="ip" name="ip" value="127.0.0.1" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
            Server Port
          </label>
          <input type="number" id="port" name="port" value="8080" required>
        </div>
        <button type="submit">Connect</button>
      </form>

      <p class="setup-footer">END-TO-END ENCRYPTED &nbsp;·&nbsp; AES-256-GCM &nbsp;·&nbsp; DIFFIE-HELLMAN</p>
    </div>
  </div>
</body>
</html>
